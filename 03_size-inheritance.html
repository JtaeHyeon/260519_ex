<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상속과 사이즈</title>
    <style>
      div {
        background-color: beige;
      }
      .parent {
        width: 400px;
        height: 200px;
        padding: 10px;
        margin: 10px;
        border: 2px solid red;
        background-color: yellow;
        /* 폰트계열*/
        color: brown;
        font-size: 36px;
        text-align: right;
        /* 폰트계열은 상속이 된다.*/
      }
      .child {
        width: 200px;
        height: 100px;
        padding: 10px;
        margin: 10px;
        border: 2px solid blue;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      부모 요소
      <div class="child">자식 요소</div>
    </div>
  </body>
</html>
