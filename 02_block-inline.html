<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Inline</title>
    <style>
      div {
        background-color: salmon;
        width: 150px;
        height: 50px;
        margin: 15px;
        padding: 15px;
        /* display: block; */
      }
      span {
        background-color: greenyellow;
        width: 150px;
        height: 50px;
        margin: 15px;
        padding: 15px;
      }
      .block {
        display: block;
      }
      .inline {
        display: inline;
      }
      .inline-block {
        /* 배치는 인라인, 박스모델은 블럭 */
        display: inline-block;
      }
      .container {
        width: 100%;
        height: 100%;
        background-color: transparent;
      }
    </style>
  </head>
  <body>
    <div>b1</div>
    <div>b2</div>
    <span>i1</span>
    <span>i2</span>
    <!-- span은 width, height 적용안됨, 가로 마진만 적용, padding 위아래 적용안됨 -->
    <div class="inline">a1</div>
    <span class="block">a2</span>
    <div class="inline-block">a3</div>
    <div class="inline-block">a4</div>
    <img src="https://picsum.photos/100/50" />
    <img src="https://picsum.photos/100/50" />
    <div style="display: none">b1</div>
    <div>b2</div>
    <div style="visibility: hidden">c1</div>
    <div>c2</div>
    <br /><br /><br /><br /><br />
    <div class="container">
      <div class="container">header : 맨 위에 사이트에 대한 설명</div>
      <div class="container">nav: 버튼, 링크들이 있는 위치</div>
      <div class="container">
        section, main/article 등 실제 컨텐츠들 들어가는 부분
      </div>
      <div class="container">footer: 사이트 정보, 저작권 등</div>
    </div>
    <!-- 모던 웹 사이트 사용 방식-->
    <section>
      <!-- component/widget라고 해서 재사용해서 재사용 되며 디자인/ 기능적으로 하나로 묶인 요소 => div-->
      <!-- 화면 구성/레이아웃에서는 일반적으로 seciton-->
      <header>반갑습니다 태현의 포폴 입니다</header>
      <nav>
        <button>포폴1</button> <button>포폴2</button>
        <button>포폴3</button>
      </nav>
      <main>
        <section>..실제 컨텐츠</section>
        <aside>사이드 컨텐츠</aside>
    <footer>2026 저작권 ~</footer>
      </main>
    </section>
  </body>
</html>
